name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            manager/package-lock.json
            clients/package-lock.json

      - name: Install manager dependencies
        working-directory: manager
        run: npm ci

      - name: Build manager
        working-directory: manager
        env:
          CI: false
          PUBLIC_URL: /${{ github.event.repository.name }}/manager
        run: npm run build

      - name: Install clients dependencies
        working-directory: clients
        run: npm ci

      - name: Build clients
        working-directory: clients
        env:
          CI: false
          PUBLIC_URL: /${{ github.event.repository.name }}/clients
        run: npm run build

      - name: Assemble deploy directory
        run: |
          mkdir -p dist/manager dist/clients
          cp -r manager/build/. dist/manager/
          cp -r clients/build/. dist/clients/
          cp landing/index.html dist/index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
