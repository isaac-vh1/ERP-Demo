name: Build Check

on:
  push:
    branches:
      - dev
      - "feature/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            manager/package-lock.json
            clients/package-lock.json

      - name: Install manager dependencies
        working-directory: manager
        run: npm ci

      - name: Build manager
        working-directory: manager
        env:
          CI: false
          PUBLIC_URL: /manager
        run: npm run build

      - name: Install clients dependencies
        working-directory: clients
        run: npm ci

      - name: Build clients
        working-directory: clients
        env:
          CI: false
          PUBLIC_URL: /clients
        run: npm run build
