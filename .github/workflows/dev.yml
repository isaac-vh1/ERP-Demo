name: Build Check

on:
  push:
    branches:
      - dev
      - "feature/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: manager/package-lock.json

      - name: Install dependencies
        working-directory: manager
        run: npm ci

      - name: Build
        working-directory: manager
        env:
          CI: false
        run: npm run build
